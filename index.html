<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fef9f2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="School" />
  <title>Homeschool Tracker</title>
  <script>
    // Early, classic-script guard (runs before the module). If app.js never
    // loads/executes on this device, the module's own handlers never install —
    // so catch errors here and run a watchdog that surfaces a blank-screen as
    // a readable message instead of silent white.
    (function () {
      function show(msg) {
        if (document.getElementById("boot-error")) return;
        var b = document.createElement("div");
        b.id = "boot-error";
        b.setAttribute("role", "alert");
        b.style.cssText =
          "margin:24px;padding:16px 20px;border-radius:12px;background:#fff3f3;" +
          "color:#7a1020;font:16px/1.5 -apple-system,system-ui,sans-serif;" +
          "border:1px solid #f0b3b3;";
        b.textContent = msg;
        (document.body || document.documentElement).appendChild(b);
      }
      window.addEventListener("error", function (e) {
        show("Couldn't start: " + (e.message || "script error") +
             (e.filename ? " — " + e.filename : ""));
      });
      window.addEventListener("unhandledrejection", function (e) {
        show("Couldn't start: " + ((e.reason && e.reason.message) || e.reason || "error"));
      });
      // Watchdog: if nothing rendered after 6s, the app files probably never
      // loaded (network/server issue reaching this page).
      window.addEventListener("load", function () {
        setTimeout(function () {
          var rings = document.getElementById("rings");
          var switcher = document.getElementById("profile-switcher");
          var rendered =
            (rings && rings.children.length) ||
            (switcher && switcher.children.length) ||
            document.getElementById("boot-error");
          if (!rendered) {
            show("The app files didn't load. This is usually the connection to " +
                 "the server dropping. Make sure the server is running and the " +
                 "iPad is on the same network, then reload.");
          }
        }, 6000);
      });
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%23fef9f2'/%3E%3Ccircle cx='96' cy='96' r='62' fill='none' stroke='%23a78bfa' stroke-width='18'/%3E%3Ctext x='96' y='120' font-size='72' text-anchor='middle'%3E%E2%AD%90%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============ Profile switcher ============ -->
  <header id="topbar">
    <div id="profile-switcher" class="profile-switcher" role="tablist" aria-label="Choose kid"></div>
    <button id="parent-btn" class="parent-btn" type="button" aria-label="Parent mode">⚙️</button>
  </header>

  <main id="main">
    <!-- ============ Today view ============ -->
    <section id="today-view">
      <div id="day-header" class="day-header">
        <h1 id="kid-greeting" class="kid-greeting">Today</h1>
        <div id="streak" class="streak" aria-live="polite"></div>
      </div>

      <!-- Free time unlocked banner (hidden until day complete) -->
      <div id="freetime-banner" class="freetime-banner" hidden>
        <div class="freetime-emoji">🎉</div>
        <div class="freetime-text">
          <strong>Free time unlocked!</strong>
          <span>All done for today. Go play! 🌟</span>
        </div>
      </div>

      <!-- The rings -->
      <div id="rings" class="rings" aria-label="Today's tasks"></div>
      <p id="empty-note" class="empty-note" hidden>No tasks today — enjoy! 🌈</p>
    </section>
  </main>

  <!-- ============ Parent PIN dialog ============ -->
  <div id="pin-overlay" class="overlay" hidden>
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="pin-title">
      <h2 id="pin-title">Parent mode</h2>
      <p>Enter the 4-digit PIN.</p>
      <input id="pin-input" class="pin-input" type="password" inputmode="numeric" maxlength="4"
             pattern="[0-9]*" autocomplete="off" aria-label="PIN" />
      <p id="pin-error" class="pin-error" hidden>Wrong PIN — try again.</p>
      <div class="dialog-actions">
        <button id="pin-cancel" type="button" class="btn btn-ghost">Cancel</button>
        <button id="pin-ok" type="button" class="btn btn-primary">Unlock</button>
      </div>
    </div>
  </div>

  <!-- ============ Parent panel ============ -->
  <div id="parent-overlay" class="overlay" hidden>
    <div class="dialog dialog-wide" role="dialog" aria-modal="true" aria-labelledby="parent-title">
      <div class="parent-head">
        <h2 id="parent-title">Curriculum</h2>
        <button id="parent-close" type="button" class="btn btn-ghost">Done</button>
      </div>

      <div id="parent-body" class="parent-body"><!-- rendered by app.js --></div>

      <div class="parent-tools">
        <button id="add-kid" type="button" class="btn btn-secondary">+ Add kid</button>
        <button id="export-btn" type="button" class="btn btn-secondary">⬇️ Export backup (JSON)</button>
        <button id="import-btn" type="button" class="btn btn-secondary">⬆️ Import backup</button>
        <input id="import-file" type="file" accept="application/json,.json" hidden />
      </div>
      <p class="parent-hint">Tip: changes save automatically. Use Export for a safe backup.</p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
